---
Managed: false
StepByStep: true
IdleKeepState: false

StatesLibraries:
  - "@MC_STATES_DEFAULT_RUNTIME_INSTALL_PREFIX@"
  - "@MC_STATES_RUNTIME_INSTALL_PREFIX@"

StatesFiles:
  - "@MC_STATES_DEFAULT_RUNTIME_INSTALL_PREFIX@/data"
  - "@MC_STATES_RUNTIME_INSTALL_PREFIX@/data"

VerboseStateFactory: false

robots:
  ground:
    module: env/ground

  base_body: base_link
  observation_source: realRobot

collisions:
  - type: collision
    useMinimal: true

ObserverPipelines:
  - name: Pipeline
    observers:
      - type: Encoder
        config:
          velocity: encoderVelocities

states: {}

transitions:
  - [NewRLQPController_Initial, OK, NewRLQPController_Initial, Strict]

init: NewRLQPController_Initial

policies_root: policies


default_policy: policyName1
